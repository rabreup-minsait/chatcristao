<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Bíblico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eaf4ff;
    --bg-soft: #f5faff;
    --surface: #ffffff;
    --surface2: #eef6ff;
    --border: #cfe0f5;
    --accent: #6aa9ff;
    --accent2: #4b92f2;
    --accent-glow: rgba(106, 169, 255, 0.18);
    --text: #1f2d3d;
    --text-muted: #5f748c;
    --bubble-bot: #ffffff;
    --bubble-user: #dcebff;
    --success: #43c07a;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(106,169,255,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 760px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    padding: 0 16px;
  }

  .header {
    padding: 24px 8px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #9dc8ff);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 18px var(--accent-glow);
    overflow: hidden;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: #b7cbe3 transparent;
  }

  .messages::-webkit-scrollbar {
    width: 5px;
  }

  .messages::-webkit-scrollbar-thumb {
    background: #b7cbe3;
    border-radius: 4px;
  }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
    overflow: hidden;
  }

  .message.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #9dc8ff);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .message.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 400;
    white-space: pre-wrap;
  }

  .message.bot .bubble {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 4px 18px rgba(57, 88, 128, 0.06);
  }

  .message.user .bubble {
    background: var(--bubble-user);
    border: 1px solid #bfd8fa;
    border-radius: 16px 4px 16px 16px;
  }

  .typing {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .typing-bubble {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 4px 18px rgba(57, 88, 128, 0.06);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 16px 8px 24px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(57, 88, 128, 0.06);
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    min-height: 24px;
    overflow-y: auto;
    scrollbar-width: none;
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .send-btn:hover {
    background: var(--accent2);
    transform: scale(1.05);
  }

  .send-btn:active {
    transform: scale(0.95);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg {
    width: 16px;
    height: 16px;
    fill: white;
  }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    padding: 40px 0;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  .welcome-icon {
    width: 68px;
    height: 68px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent), #9dc8ff);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px var(--accent-glow);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .welcome h2 {
    font-size: 21px;
    font-weight: 600;
    text-align: center;
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    font-weight: 400;
    max-width: 360px;
    line-height: 1.7;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 560px;
  }

  .chip {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(57, 88, 128, 0.04);
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: #eef6ff;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">
      <img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" />
    </div>
    <div class="header-info">
      <h1>Assistente Bíblico</h1>
      <div class="status"><div class="status-dot"></div>online</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:20px;" />
      </div>
      <h2>Olá! Como posso ajudar?</h2>
      <p>Sou seu assistente pessoal. Podemos falar sobre coisas cristãs... :-)</p>
      <div class="chips">
        <div class="chip" onclick="sendChip(this)">o que significa evangelho?</div>
        <div class="chip" onclick="sendChip(this)">quem foi salomão?</div>
        <div class="chip" onclick="sendChip(this)">qual o salmo diz que o Senhor é meu pastor?</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>

<script>
  const API_URL = 'https://chatbot-api-production-ae7d.up.railway.app/chat';
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  let userId = localStorage.getItem("user_id");

  if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("user_id", userId);
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendChip(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  function addMessage(text, type) {
    const w = document.getElementById('welcome');
    if (w) w.remove();

    const msg = document.createElement('div');
    msg.className = `message ${type}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = type === 'bot'
      ? '<img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />'
      : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';

    const a = document.createElement('div');
    a.className = 'msg-avatar';
    a.style.cssText = 'background:linear-gradient(135deg,#6aa9ff,#9dc8ff);box-shadow:0 0 12px rgba(106,169,255,0.18);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;';
    a.innerHTML = '<img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />';

    const b = document.createElement('div');
    b.className = 'typing-bubble';
    b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    t.appendChild(a);
    t.appendChild(b);
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto: text, user_id: userId })
      });

      const data = await res.json();
      hideTyping();
      addMessage(data.resposta, 'bot');
    } catch (err) {
      hideTyping();
      addMessage('Erro ao conectar com a API. Verifique se o servidor está rodando.', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
